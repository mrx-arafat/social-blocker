<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e5e5"/>
      <stop offset="100%" style="stop-color:#a3a3a3"/>
    </linearGradient>
    <linearGradient id="break" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Left chain link -->
  <g transform="translate(-4, 0)">
    <rect x="28" y="40" width="40" height="48" rx="20" ry="20" fill="none" stroke="url(#chain)" stroke-width="8"/>
  </g>
  <!-- Right chain link (broken, shifted) -->
  <g transform="translate(8, 0)">
    <rect x="60" y="40" width="40" height="48" rx="20" ry="20" fill="none" stroke="url(#chain)" stroke-width="8"/>
  </g>
  <!-- Break spark / energy burst -->
  <g transform="translate(64, 64)">
    <line x1="-3" y1="-14" x2="3" y2="-8" stroke="url(#break)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-3" y1="8" x2="3" y2="14" stroke="url(#break)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-6" y1="-4" x2="6" y2="4" stroke="url(#break)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
